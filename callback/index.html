<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  if (error) {
    const returnUrl = state ? decodeURIComponent(state) : null;
    if (returnUrl) {
      window.location.href = returnUrl + '?error=' + encodeURIComponent(error);
    }
  } else if (code && state) {
    const returnUrl = decodeURIComponent(state);
    window.location.href = returnUrl + '?code=' + encodeURIComponent(code);
  }
</script>
<p>Redirecting back to the app...</p>
</body>
</html>
